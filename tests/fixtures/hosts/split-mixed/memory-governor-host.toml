version = "0.1"
profile = "custom"

[targets.proactive_state]
mode = "split"
paths = ["memory/proactive-boundaries.md", "memory/session-state.md"]
structured = true

[targets.reusable_lessons]
mode = "single"
paths = ["memory/reusable-lessons.md"]
